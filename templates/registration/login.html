{% extends 'base.html' %}

{% block title %}Login{% endblock %}

{% block login_content %}
<div style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-color); width: 100%;">
    <div class="card" style="width: 100%; max-width: 400px;">
        <h2 style="text-align: center; color: var(--primary-color); margin-bottom: 24px;">Village Square POS</h2>
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" class="form-control" required autofocus>
            </div>
            <div class="form-group">
                <label for="id_password">Password</label>
                <input type="password" name="password" id="id_password" class="form-control" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 16px;">Login</button>
            {% if form.errors %}
                <p style="color: #721c24; background-color: #f8d7da; padding: 12px; border-radius: 8px; margin-top: 16px; font-size: 0.9rem;">
                    Invalid username or password.
                </p>
            {% endif %}
        </form>
    </div>
</div>
{% endblock %}
